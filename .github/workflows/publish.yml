name: Publish to PyPI

# Publishes papercheck to PyPI when a GitHub Release is published, using PyPI
# Trusted Publishing (OpenID Connect) — no API token or password is stored.
# The matching trusted publisher must be registered on PyPI:
#   project: papercheck   owner: cgarryZA   repo: papercheck
#   workflow: publish.yml  environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/papercheck
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check the built distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Don't fail if this version is already on PyPI (e.g. a release was
          # edited/re-published for a version that was already uploaded).
          skip-existing: true
