<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" role="img" aria-label="demo placeholder">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1424"/>
      <stop offset="1" stop-color="#131d33"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1000" height="480" rx="20" fill="url(#pbg)"/>
  <rect x="1.5" y="1.5" width="997" height="477" rx="19" fill="none" stroke="#243250" stroke-width="3" stroke-dasharray="10 10"/>
  <!-- terminal chrome -->
  <circle cx="44" cy="42" r="8" fill="#ef4444"/>
  <circle cx="72" cy="42" r="8" fill="#f59e0b"/>
  <circle cx="100" cy="42" r="8" fill="#22c55e"/>
  <line x1="0" y1="72" x2="1000" y2="72" stroke="#243250" stroke-width="2"/>
  <g font-family="'JetBrains Mono','Consolas',monospace" font-size="21">
    <text x="40" y="122" fill="#7dd3fc">$ papercheck scan ./paper</text>
    <text x="40" y="158" fill="#94a3b8">  theorem envs: 6   labels: 24   unresolved refs: 0</text>
    <text x="40" y="200" fill="#7dd3fc">$ papercheck gate ./paper --mechanical-only</text>
    <text x="40" y="236" fill="#22c55e" font-weight="700">  ==== READY ====</text>
    <text x="40" y="278" fill="#7dd3fc">$ claude mcp add papercheck -- papercheck-mcp</text>
    <text x="40" y="314" fill="#94a3b8">  "audit this paper with papercheck"</text>
  </g>
  <g transform="translate(500,410)">
    <circle cx="0" cy="0" r="34" fill="#0b1220" stroke="#38bdf8" stroke-width="3"/>
    <path d="M-10 -16 L18 0 L-10 16 Z" fill="#38bdf8"/>
  </g>
  <text x="500" y="466" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#64748b">▶  drop a demo GIF or screenshot here</text>
</svg>
