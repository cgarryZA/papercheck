<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="papercheck">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="318" rx="27" fill="none" stroke="#1f2a44" stroke-width="2"/>

  <!-- icon: document + magnifier + check -->
  <g transform="translate(96,72)" filter="url(#soft)">
    <rect x="0" y="0" width="132" height="176" rx="14" fill="#0f1830" stroke="#2b3a5e" stroke-width="2"/>
    <rect x="22" y="30" width="88" height="10" rx="5" fill="#33415c"/>
    <rect x="22" y="56" width="72" height="10" rx="5" fill="#33415c"/>
    <rect x="22" y="82" width="88" height="10" rx="5" fill="#33415c"/>
    <rect x="22" y="108" width="54" height="10" rx="5" fill="#33415c"/>
    <!-- magnifier -->
    <circle cx="104" cy="126" r="42" fill="#0b1220" stroke="url(#accent)" stroke-width="9"/>
    <line x1="134" y1="156" x2="168" y2="190" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <!-- check inside lens -->
    <path d="M86 126 l14 15 l24 -30" fill="none" stroke="#22c55e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(330,150)">
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="86" font-weight="800" fill="#f8fafc" letter-spacing="-1">paper<tspan fill="#38bdf8">check</tspan></text>
    <text x="4" y="52" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="500" fill="#94a3b8">A reproducible audit harness for mathematical papers</text>
  </g>

  <!-- pills -->
  <g transform="translate(334,232)" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600">
    <g><rect x="0" y="0" width="86" height="40" rx="20" fill="#0f1830" stroke="#2b3a5e"/><text x="43" y="27" text-anchor="middle" fill="#cbd5e1">MCP</text></g>
    <g transform="translate(100,0)"><rect x="0" y="0" width="78" height="40" rx="20" fill="#0f1830" stroke="#2b3a5e"/><text x="39" y="27" text-anchor="middle" fill="#cbd5e1">CLI</text></g>
    <g transform="translate(190,0)"><rect x="0" y="0" width="104" height="40" rx="20" fill="#0f1830" stroke="#2b3a5e"/><text x="52" y="27" text-anchor="middle" fill="#cbd5e1">LaTeX</text></g>
    <g transform="translate(306,0)"><rect x="0" y="0" width="140" height="40" rx="20" fill="#0f1830" stroke="#2b3a5e"/><text x="70" y="27" text-anchor="middle" fill="#cbd5e1">stage-gated</text></g>
    <g transform="translate(458,0)"><rect x="0" y="0" width="78" height="40" rx="20" fill="#0f1830" stroke="#2b3a5e"/><text x="39" y="27" text-anchor="middle" fill="#cbd5e1">MIT</text></g>
  </g>
</svg>
